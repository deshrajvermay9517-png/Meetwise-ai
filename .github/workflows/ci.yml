name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint (if available)
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)" 2>/dev/null; then
            echo "Lint script found in package.json. Running npm run lint..."
            npm run lint
          else
            echo "No lint script found in package.json. Skipping lint checks."
          fi

      - name: Run build (if available)
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)" 2>/dev/null; then
            echo "Build script found in package.json. Running npm run build..."
            npm run build
          else
            echo "No build script found in package.json. Skipping build verification."
          fi

name: "🐛 Bug Report"
description: "Report a bug to help us improve Meetwise"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us understand and resolve the issue.
  - type: textarea
    id: overview
    attributes:
      label: "Overview"
      description: "Provide a clear and concise description of the bug."
      placeholder: "Describe what the bug is..."
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Detail the exact steps required to reproduce the bug."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "Describe what you expected to happen."
      placeholder: "What should have happened?"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Define the criteria that will indicate this bug has been successfully resolved."
      placeholder: "e.g., The form submits without throwing a 500 error."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Add any other context, console logs, environment details, or screenshots here."
      placeholder: "e.g., OS: Windows, Browser: Chrome, error stack trace, etc."
    validations:
      required: false
